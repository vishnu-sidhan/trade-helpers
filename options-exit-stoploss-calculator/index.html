<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Options Exit Price Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="calculator">
  <div class="header">
    <h1>Options Exit Price Calculator</h1>
    <p>NIFTY / SENSEX CE/PE Options</p>
  </div>
  <div class="form-grid">
    <div class="form-group">
      <label>Strike Price (₹)</label>
      <input type="number" id="strike" value="23200" placeholder="e.g. 23200">
    </div>
    <div class="form-group">
      <label>Entry Premium (₹)</label>
      <input type="number" id="entry" value="125" placeholder="e.g. 125">
    </div>
    <div class="form-group">
      <label>Nifty at Entry</label>
      <input type="number" id="spotEntry" value="23125" placeholder="e.g. 23125">
    </div>
    <div class="form-group">
      <label>Target Nifty Level</label>
      <input type="number" id="spotTarget" value="23400" placeholder="e.g. 23400">
    </div>
    <div class="form-group">
      <label>Lot Size (qty)</label>
      <input type="number" id="lotSize" value="65" placeholder="e.g. 65">
    </div>
    <div class="form-group">
      <label>Option Type</label>
      <select id="optionType">
        <option value="CE">CE (Call)</option>
        <option value="PE">PE (Put)</option>
      </select>
    </div>
    <div class="form-group">
      <label>IV Scenario</label>
      <select id="ivScenario">
        <option value="conservative">Conservative (IV drops)</option>
        <option value="base" selected>Base Case (IV neutral)</option>
        <option value="optimistic">Optimistic (IV expands)</option>
      </select>
    </div>
    <div class="form-group">
      <label>Trade Type</label>
      <select id="tradeType">
        <option value="intraday" selected>Intraday (same day)</option>
        <option value="overnight">Overnight</option>
      </select>
    </div>
  </div>
  <button onclick="calculate()">Calculate Exit Price</button>
  <div class="sl-section">
  <div class="sl-header">&#9888; Stop Loss Calculator</div>
  <div class="form-grid">
    <div class="form-group">
      <label>SL Type</label>
      <select id="slType" onchange="toggleSLInputs()">
        <option value="percent">% Based (e.g. 30% of premium)</option>
        <option value="points">Points Based (e.g. 50 pts below entry)</option>
        <option value="spot">Spot Level Based (e.g. Nifty at 23000)</option>
        <option value="fixed">Fixed Premium (e.g. exit at ₹70)</option>
      </select>
    </div>
    <div class="form-group" id="slValueGroup">
      <label id="slValueLabel">SL % of Premium</label>
      <input type="number" id="slValue" value="30" placeholder="e.g. 30">
    </div>
    <div class="form-group">
      <label>No. of Lots</label>
      <input type="number" id="slLots" value="1" placeholder="e.g. 1">
    </div>
<button onclick="calculateSL()" style="background:linear-gradie      nt(135deg,#dc2626,#7f1d1d);margin-top:4px">&#128683; Calculate Stop Loss</button>
  <div id="slResult" class="result-box" style="display:none"></div>
</div>
  <div id="result" class="result-box" style="display:none"></div>
</div>
<script src="functions.js"></script>
</body>
</html>
